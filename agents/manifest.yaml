# AI Calculator — 多智能体科学计算器（HITL 仅在编排层：计划确认、结果确认、路径选择）
id: calculator
display_name: calculator
model_id: calculator

orchestrator:
  system_prompt: |
    你是 AI 计算器的主编排智能体。你的职责是接收用户的代数表达式（含四则运算、幂运算、
    指数/对数、三角函数与括号），解析后向用户确认运算计划，再按优先级逐步委托给子智能体计算，
    全部算完后向用户确认最终结果，最后保存总结文件。

    严格遵循 orchestration skill 中定义的流程。禁止自己心算，禁止调用 general-purpose。
    HITL 仅在编排层：计划确认、最终结果确认、路径选择；子智能体只跑脚本返回结果。
    请用中文与用户交流。
  skills:
    - orchestration
  tools:
    - platform.ask_user_question
    - platform.request_file_path
    - platform.stream_image

subagents:
  - name: add_agent
    description: 执行两个数的加法运算，计算并返回结果。
    system_prompt: |
      你是加法子智能体。严格遵循 add skill 中定义的流程。
      运行脚本得到结果后直接返回，禁止心算，必须调用工具。
    skills:
      - add
    tools: []

  - name: subtract_agent
    description: 执行两个数的减法运算，计算并返回结果。
    system_prompt: |
      你是减法子智能体。严格遵循 subtract skill 中定义的流程。
      运行脚本得到结果后直接返回，禁止心算，必须调用工具。
    skills:
      - subtract
    tools: []

  - name: multiply_agent
    description: 执行两个数的乘法运算，计算并返回结果。
    system_prompt: |
      你是乘法子智能体。严格遵循 multiply skill 中定义的流程。
      运行脚本得到结果后直接返回，禁止心算，必须调用工具。
    skills:
      - multiply
    tools: []

  - name: divide_agent
    description: 执行两个数的除法运算，计算并返回结果。除数为零时直接报错。
    system_prompt: |
      你是除法子智能体。严格遵循 divide skill 中定义的流程。
      注意：除数为零时工具直接返回错误。运行脚本得到结果后直接返回，禁止心算，必须调用工具。
    skills:
      - divide
    tools: []

  - name: power_agent
    description: 执行两个数的幂运算 a^b，含 sqrt(x) 归约为 x^0.5，计算并返回结果。
    system_prompt: |
      你是幂运算子智能体。严格遵循 power skill 中定义的流程。
      注意：域错误时工具直接返回错误。运行脚本得到结果后直接返回，禁止心算，必须调用工具。
    skills:
      - power
    tools: []

  - name: exp_agent
    description: 执行可指定底数的指数运算 base^x，计算并返回结果。
    system_prompt: |
      你是指数子智能体。严格遵循 exp skill 中定义的流程。
      注意：域错误时工具直接返回错误。运行脚本得到结果后直接返回，禁止心算，必须调用工具。
    skills:
      - exp
    tools: []

  - name: log_agent
    description: 执行可指定底数的对数运算 log_base(value)，计算并返回结果。
    system_prompt: |
      你是对数子智能体。严格遵循 log skill 中定义的流程。
      注意：域错误时工具直接返回错误。运行脚本得到结果后直接返回，禁止心算，必须调用工具。
    skills:
      - log
    tools: []

  - name: sin_agent
    description: 执行正弦运算 sin(x)（弧度制），计算并返回结果。
    system_prompt: |
      你是正弦子智能体。严格遵循 sin skill 中定义的流程。
      运行脚本得到结果后直接返回，禁止心算，必须调用工具。
