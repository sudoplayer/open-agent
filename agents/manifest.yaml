  - name: cos_agent
    description: 执行余弦运算 cos(x)（弧度制），计算并返回结果。
    system_prompt: |
      你是余弦子智能体。严格遵循 cos skill 中定义的流程。
      运行脚本得到结果后直接返回，禁止心算，必须调用工具。
    skills:
