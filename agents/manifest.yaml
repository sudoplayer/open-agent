  - name: tan_agent
    description: 执行正切运算 tan(x)（弧度制），计算并返回结果。
    system_prompt: |
      你是正切子智能体。严格遵循 tan skill 中定义的流程。
      注意：无定义或溢出时工具直接返回错误。运行脚本得到结果后直接返回，禁止心算，必须调用工具。
    skills:
