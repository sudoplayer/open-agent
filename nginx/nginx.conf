# nginx configuration for conda deployment
# Usage:
#   conda activate nginx
#   nginx -c /path/to/repo/nginx/nginx.conf

worker_processes  auto;
error_log   /home/sandy/.nginx/logs/error.log warn;
pid         /home/sandy/.nginx/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /home/sandy/miniconda3/envs/nginx/etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    client_body_temp_path   /home/sandy/.nginx/tmp/client;
    proxy_temp_path         /home/sandy/.nginx/tmp/proxy;
    fastcgi_temp_path       /home/sandy/.nginx/tmp/fastcgi;
    uwsgi_temp_path         /home/sandy/.nginx/tmp/uwsgi;
    scgi_temp_path          /home/sandy/.nginx/tmp/scgi;

    server {
        listen       3066;
        server_name  _;

        # ---------- JS injection (HITL cards) ----------
        sub_filter '<head>'
            '<head><script src="/ask_question.js?v=1.0.0"></script><script src="/request_file_path.js?v=1.0.0"></script>';
        sub_filter_once on;
        sub_filter_types text/html;

        location /ask_question.js {
            alias /home/sandy/Projects/open-agent/frontend/ask_question.js;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location /request_file_path.js {
            alias /home/sandy/Projects/open-agent/frontend/request_file_path.js;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ---------- Backend platform (AI agent orchestration) ----------
        location /v1/fs/ {
            proxy_pass http://127.0.0.1:8888;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---------- OpenWebUI API ----------
        location /api/ {
            proxy_pass http://127.0.0.1:3088;
            proxy_set_header Accept-Encoding "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # ---------- OpenWebUI pages ----------
        location / {
            proxy_pass http://127.0.0.1:3088;
            proxy_set_header Accept-Encoding "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache off;
            proxy_read_timeout 3600s;
        }
    }
}
